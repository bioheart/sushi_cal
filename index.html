<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sushi Plate Counter</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<header>
  <div class="header">
    <span>🍣</span><span>Sushi Plate Counter</span><span class="app-version" id="appVersion">v1.0.0</span>
  </div>
</header>

<div class="plates-list" id="platesList"></div>

<div class="add-custom-wrap">
  <button class="add-custom-btn" id="addCustomBtn">＋ Add Custom Plate</button>
</div>

<footer>
  <div class="total-row">
    <div>
      <div class="total-label">Total</div>
      <div id="totalPlatesLabel" class="total-plates"></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <button class="undo-btn" id="undoBtn" disabled>↩ Undo</button>
      <button class="reset-btn" id="resetBtn">Reset</button>
      <div id="totalAmount" class="total-amount">฿0</div>
    </div>
  </div>
</footer>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Add Custom Plate</h2>
    <p id="modalSubtitle">Set a name and price for your custom plate.</p>
    <label for="inputName">Plate Name</label>
    <input type="text" id="inputName" placeholder="e.g. Special Roll" maxlength="24" />
    <label for="inputPrice">Price</label>
    <input type="number" id="inputPrice" placeholder="e.g. 120 (THB)" min="1" max="9999" />
    <div class="error-msg" id="errorMsg">Please enter a valid price (1–9999).</div>
    <div class="modal-actions">
      <button class="modal-cancel" id="modalCancelBtn">Cancel</button>
      <button class="modal-confirm" id="modalConfirmBtn">Confirm</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
